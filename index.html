      inset: 0;
      background: linear-gradient(160deg, rgba(253,246,236,0.55) 0%, rgba(180,155,110,0.35) 100%);
      backdrop-filter: blur(2px);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.6s ease both;
    }
    .header-badge {
      display: inline-block;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      backdrop-filter: blur(12px);
      margin-bottom: 14px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: var(--ink-soft);
      font-weight: 300;
    }

    /* person cards */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .av-mina    { background: #e8d5c4; color: #7a4a2a; }
    .av-hedyeh  { background: #cdd9c8; color: #2e5c34; }
    .av-hannaneh{ background: #d4cce8; color: #3d2e7a; }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
    }

    /* table */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .items-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: 0 6px 8px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .items-table th:last-child { width: 32px; }
    .items-table td {
      padding: 5px 6px;
      vertical-align: middle;
    }
    .items-table tr:not(:last-child) td {
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.75);
    }
    input[type="number"] { text-align: right; }
    input::placeholder { color: var(--ink-muted); }

    .col-item  { width: 55%; }
    .col-price { width: 35%; }
    .col-del   { width: 10%; text-align: center; }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-muted);
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: var(--terracotta); }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--sage);
      font-weight: 500;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .btn-add:hover { color: var(--sage-light); }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(201,168,76,0.2);
      font-size: 13px;
      color: var(--ink-soft);
    }
    .card-total {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
    }

    /* calculate button */
    .btn-calc {
      width: 100%;
      padding: 16px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: var(--radius);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      margin: 0.5rem 0 1.5rem;
      transition: background 0.2s, transform 0.15s;
      animation: fadeUp 0.5s 0.45s ease both;
    }
    .btn-calc:hover { background: #3d3025; transform: translateY(-1px); }
    .btn-calc:active { transform: translateY(0); }

    /* result */
    .result-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .result-card.show {
      display: block;
      animation: fadeUp 0.4s ease both;
    }

    .result-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 0.25rem;
    }
    .summary-item {
      background: rgba(255,255,255,0.45);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .summary-label {
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .summary-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }

    /* transfers */
    .transfer-list { display: flex; flex-direction: column; gap: 8px; }
    .transfer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
    }
    .tr-mina     { background: rgba(232, 213, 196, 0.6); }
    .tr-hedyeh   { background: rgba(205, 217, 200, 0.6); }
    .tr-hannaneh { background: rgba(212, 204, 232, 0.6); }
    .tr-settled  { background: rgba(255,255,255,0.3); }

    .transfer-text { color: var(--ink); }
    .transfer-text strong { font-weight: 500; }
    .transfer-amount {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
    }
    .settled-text { font-size: 13px; color: var(--ink-soft); }
    .check { color: var(--sage); font-size: 16px; }

    /* animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .summary-val { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="header-badge">🧺 Picnic &nbsp;·&nbsp; Split the bill</div>
    <h1>Who bought what?</h1>
    <p>Enter each person's purchases, then calculate who owes whom.</p>
  </header>

  <div id="cards-container">
    <!-- Mina -->
    <div class="card" data-person="mina">
      <div class="card-header">
        <div class="avatar av-mina">M</div>
        <div class="card-name">Mina</div>
      </div>
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-item">Item</th>
            <th class="col-price">Price ($)</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="rows-mina">
          <tr>
            <td><input type="text" placeholder="e.g. Bread"></td>
            <td><input type="number" placeholder="0" min="0"></td>
            <td><button class="btn-remove" onclick="removeRow(this)" aria-label="Remove">×</button></td>
          </tr>
        </tbody>
      </table>
      <button class="btn-add" onclick="addRow('mina')">＋ Add item</button>
      <div class="card-footer">
        <span>Mina's total</span>
        <span class="card-total" id="total-mina">0</span>
      </div>
    </div>

    <!-- Hedyeh -->
    <div class="card" data-person="hedyeh">
      <div class="card-header">
        <div class="avatar av-hedyeh">H</div>
        <div class="card-name">Hedyeh</div>
      </div>
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-item">Item</th>
            <th class="col-price">Price ($)</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="rows-hedyeh">
          <tr>
            <td><input type="text" placeholder="e.g. Juice"></td>
            <td><input type="number" placeholder="0" min="0"></td>
            <td><button class="btn-remove" onclick="removeRow(this)" aria-label="Remove">×</button></td>
          </tr>
        </tbody>
      </table>
      <button class="btn-add" onclick="addRow('hedyeh')">＋ Add item</button>
      <div class="card-footer">
        <span>Hedyeh's total</span>
        <span class="card-total" id="total-hedyeh">0</span>
      </div>
    </div>

    <!-- Hannaneh -->
    <div class="card" data-person="hannaneh">
      <div class="card-header">
        <div class="avatar av-hannaneh">H</div>
        <div class="card-name">Hannaneh</div>
      </div>
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-item">Item</th>
            <th class="col-price">Price ($)</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="rows-hannaneh">
          <tr>
            <td><input type="text" placeholder="e.g. Chips"></td>
            <td><input type="number" placeholder="0" min="0"></td>
            <td><button class="btn-remove" onclick="removeRow(this)" aria-label="Remove">×</button></td>
          </tr>
        </tbody>
      </table>
      <button class="btn-add" onclick="addRow('hannaneh')">＋ Add item</button>
      <div class="card-footer">
        <span>Hannaneh's total</span>
        <span class="card-total" id="total-hannaneh">0</span>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="calculate()">Calculate &amp; Settle Up ✓</button>

  <!-- Summary -->
  <div class="result-card" id="res-summary">
    <div class="result-heading">Summary</div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">Grand Total</div>
        <div class="summary-val" id="res-total">—</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Each Owes</div>
        <div class="summary-val" id="res-share">—</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">People</div>
        <div class="summary-val">3</div>
      </div>
    </div>
  </div>

  <!-- Transfers -->
  <div class="result-card" id="res-transfers">
    <div class="result-heading">Who pays whom</div>
    <div class="transfer-list" id="transfer-list"></div>
  </div>
</div>

<script>
  const people = ['mina', 'hedyeh', 'hannaneh'];
  const labels = { mina: 'Mina', hedyeh: 'Hedyeh', hannaneh: 'Hannaneh' };
  const trClass = { mina: 'tr-mina', hedyeh: 'tr-hedyeh', hannaneh: 'tr-hannaneh' };

  function fmt(n) {
    return Math.round(n).toLocaleString('en-US') + ' $';
  }

  function getTotal(person) {
    let sum = 0;
    document.querySelectorAll(`#rows-${person} tr`).forEach(r => {
      sum += parseFloat(r.querySelectorAll('input')[1].value) || 0;
    });
    return sum;
  }

  function updateTotals() {
    people.forEach(p => {
      document.getElementById(`total-${p}`).textContent = Math.round(getTotal(p)).toLocaleString('en-US') + ' $';
    });
  }

  function addRow(person) {
    const tbody = document.getElementById(`rows-${person}`);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="Item name"></td>
      <td><input type="number" placeholder="0" min="0"></td>
      <td><button class="btn-remove" onclick="removeRow(this)" aria-label="Remove">×</button></td>`;
    tr.querySelectorAll('input').forEach(i => i.addEventListener('input', updateTotals));
    tbody.appendChild(tr);
  }

  function removeRow(btn) {
    const tbody = btn.closest('tr').parentElement;
    if (tbody.querySelectorAll('tr').length > 1) {
      btn.closest('tr').remove();
      updateTotals();
    }
  }

  function calculate() {
    const totals = {};
    people.forEach(p => { totals[p] = getTotal(p); });
    const grand = Object.values(totals).reduce((a, b) => a + b, 0);
    const share = grand / 3;

    document.getElementById('res-total').textContent = fmt(grand);
    document.getElementById('res-share').textContent = fmt(share);
    document.getElementById('res-summary').classList.add('show');

    const balance = {};
    people.forEach(p => { balance[p] = totals[p] - share; });

    const debtors   = people.filter(p => balance[p] < -0.5).map(p => ({ name: p, amount: -balance[p] }));
    const creditors = people.filter(p => balance[p] >  0.5).map(p => ({ name: p, amount:  balance[p] }));
    const settled   = people.filter(p => Math.abs(balance[p]) <= 0.5);

    const d = debtors.map(x => ({...x}));
    const c = creditors.map(x => ({...x}));
    const txns = [];
    let i = 0, j = 0;
    while (i < d.length && j < c.length) {
      const pay = Math.min(d[i].amount, c[j].amount);
      txns.push({ from: d[i].name, to: c[j].name, amount: Math.round(pay) });
      d[i].amount -= pay; c[j].amount -= pay;
      if (d[i].amount < 0.5) i++;
      if (c[j].amount < 0.5) j++;
    }

    const list = document.getElementById('transfer-list');
    list.innerHTML = '';

    if (txns.length === 0) {
      list.innerHTML = '<div class="transfer-row tr-settled"><span class="settled-text">All even — no payments needed! 🎉</span></div>';
    } else {
      txns.forEach(t => {
        const div = document.createElement('div');
        div.className = `transfer-row ${trClass[t.from]}`;
        div.innerHTML = `<span class="transfer-text"><strong>${labels[t.from]}</strong> → <strong>${labels[t.to]}</strong></span><span class="transfer-amount">${t.amount.toLocaleString('en-US')} $</span>`;
        list.appendChild(div);
      });
    }

    settled.forEach(p => {
      const div = document.createElement('div');
      div.className = 'transfer-row tr-settled';
      div.innerHTML = `<span class="settled-text">${labels[p]} is all settled</span><span class="check">✓</span>`;
      list.appendChild(div);
    });

    document.getElementById('res-transfers').classList.add('show');
    document.getElementById('res-summary').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateTotals));
</script>
